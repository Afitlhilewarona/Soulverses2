<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Verses — A Poetry Sanctuary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<!-- (your CSS stays EXACTLY the same — I removed it here only to shorten response) -->
<style>
/* KEEP YOUR ENTIRE ORIGINAL CSS HERE (UNCHANGED) */
</style>

</head>

<body>
<div class="starfield"></div>

<!-- ===== YOUR HTML STAYS THE SAME ===== -->

<nav>
  <div class="logo">Soul Verses<span>Poetry Sanctuary</span></div>
  <div class="nav-links">
    <a href="#browse">Browse</a>
    <a href="#post">Post a Poem</a>
    <button class="btn btn-outline">Sign In</button>
    <button class="btn btn-solid">Join</button>
  </div>
</nav>

<!-- HERO (UNCHANGED) -->
<div class="hero">
  <p class="hero-eyebrow">✦ A Home for Every Voice ✦</p>
  <h1>Where <em>souls</em> find their words</h1>
  <p class="hero-sub">A sanctuary where poets share what lives beneath.</p>
</div>

<!-- BROWSE -->
<section id="browse">
  <p class="section-label">Latest Poems</p>
  <h2 class="section-title">Voices from the sanctuary</h2>

  <div class="filter-bar" id="filterBar"></div>
  <div class="poem-grid" id="poemGrid"></div>
</section>

<!-- POST -->
<section id="post">
  <p class="section-label">Share Your Voice</p>
  <h2 class="section-title">Post a Poem</h2>

  <div class="post-section">
    <input id="authorName" placeholder="Your name">
    <input id="poemTitle" placeholder="Poem title">

    <select id="poemGenre">
      <option>Grief</option>
      <option>Faith</option>
      <option>Love</option>
      <option>Identity</option>
      <option>Nature</option>
      <option>Joy</option>
    </select>

    <textarea id="poemBody" placeholder="Write your poem..."></textarea>

    <button onclick="submitPoem()">Publish Poem</button>
  </div>
</section>

<!-- FIREBASE + APP LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== STATE ===== */
let poems = [];
let activeFilter = "All";
let likedPoems = new Set();

/* ===== LOAD POEMS ===== */
async function loadPoems() {
  const snap = await getDocs(collection(db, "poems"));

  poems = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  renderFilterBar();
  renderPoems();
}

/* ===== FILTER ===== */
function getGenres() {
  return ["All", ...new Set(poems.map(p => p.genre))];
}

function renderFilterBar() {
  document.getElementById("filterBar").innerHTML =
    getGenres().map(g =>
      `<button onclick="setFilter('${g}')">${g}</button>`
    ).join("");
}

window.setFilter = function (g) {
  activeFilter = g;
  renderFilterBar();
  renderPoems();
};

/* ===== RENDER ===== */
function renderPoems() {
  const grid = document.getElementById("poemGrid");

  const list = activeFilter === "All"
    ? poems
    : poems.filter(p => p.genre === activeFilter);

  grid.innerHTML = list.map(p => `
    <div class="poem-card">
      <h3>${p.title}</h3>
      <p>${p.author}</p>
      <p>${p.body.slice(0, 120)}...</p>

      <button onclick="likePoem('${p.id}', ${p.likes || 0})">
        ♥ ${p.likes || 0}
      </button>
    </div>
  `).join("");
}

/* ===== POST POEM ===== */
window.submitPoem = async function () {
  const name = authorName.value;
  const title = poemTitle.value;
  const genre = poemGenre.value;
  const body = poemBody.value;

  if (!name || !title || !body) return alert("Fill all fields");

  await addDoc(collection(db, "poems"), {
    author: name,
    title,
    genre,
    body,
    likes: 0,
    createdAt: Date.now()
  });

  poemBody.value = "";
  poemTitle.value = "";
  authorName.value = "";

  loadPoems();
};

/* ===== LIKE ===== */
window.likePoem = async function (id, likes) {
  const ref = doc(db, "poems", id);

  await updateDoc(ref, {
    likes: increment(1)
  });

  loadPoems();
};

/* ===== START APP ===== */
loadPoems();
</script>

</body>
</html>
